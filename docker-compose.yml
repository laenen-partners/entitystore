services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5489:5432"
    environment:
      POSTGRES_USER: showcase
      POSTGRES_PASSWORD: showcase
      POSTGRES_DB: entitystore_showcase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showcase"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
