version: '3'

vars:
  DB_URL: '{{.DB_URL | default "postgres://postgres:postgres@localhost:5433/entitystore?sslmode=disable"}}'

tasks:
  generate:
    desc: Generate proto and SQLC code
    cmds:
      - buf generate
      - cd store && sqlc generate

  generate:plugin:
    desc: Install the protoc-gen-entitystore plugin
    cmds:
      - go install ./cmd/protoc-gen-entitystore

  proto:login:
    desc: Log in to Buf Schema Registry
    cmds:
      - buf registry login

  proto:create:
    desc: Create BSR module (one-time)
    cmds:
      - buf registry module create buf.build/laenen-partners/entitystore --visibility public

  proto:push:
    desc: Lint and push proto module to BSR
    cmds:
      - buf lint
      - buf push

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run integration tests (uses testcontainers, requires Docker)
    cmds:
      - go test -v -count=1 ./store/...

  test:cover:
    desc: Run tests with coverage
    cmds:
      - go test -coverprofile=coverage.out -count=1 ./...
      - go tool cover -func=coverage.out

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts and local data
    cmds:
      - rm -rf bin/ coverage.out

  migrate:up:
    desc: Apply all pending migrations
    cmds:
      - dbmate -u "{{.DB_URL}}" -d ./store/db/migrations --migrations-table entitystore_migrations up

  migrate:down:
    desc: Roll back the latest migration
    cmds:
      - dbmate -u "{{.DB_URL}}" -d ./store/db/migrations --migrations-table entitystore_migrations down

  migrate:status:
    desc: Show migration status
    cmds:
      - dbmate -u "{{.DB_URL}}" -d ./store/db/migrations --migrations-table entitystore_migrations status
