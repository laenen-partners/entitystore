version: '3'

vars:
  DB_URL: '{{.DB_URL | default "postgres://postgres:postgres@localhost:5433/entitystore?sslmode=disable"}}'

tasks:
  generate:
    desc: Generate proto and SQLC code
    cmds:
      - buf generate
      - cd store && sqlc generate

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  build:
    desc: Build server binary
    cmds:
      - go build -o bin/estore ./cmd/estore

  run:
    desc: Run the entity store server
    env:
      DATABASE_URL: '{{.DB_URL}}'
    cmds:
      - go run ./cmd/estore

  test:
    desc: Run integration tests (requires Postgres on :5433)
    env:
      ENTITY_TEST_DB: '{{.DB_URL}}'
    cmds:
      - go test -v -count=1 ./store/...

  test:e2e:
    desc: Run end-to-end tests (requires Postgres on :5433)
    env:
      DATABASE_URL: '{{.DB_URL}}'
    cmds:
      - go test -v -count=1 -run TestE2E ./...

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  migrate:up:
    desc: Apply all pending migrations
    cmds:
      - dbmate -u "{{.DB_URL}}" -d ./store/db/migrations up

  migrate:down:
    desc: Roll back the latest migration
    cmds:
      - dbmate -u "{{.DB_URL}}" -d ./store/db/migrations down

  migrate:status:
    desc: Show migration status
    cmds:
      - dbmate -u "{{.DB_URL}}" -d ./store/db/migrations status

  infra:up:
    desc: Start Postgres via docker compose
    cmds:
      - docker compose up -d

  infra:down:
    desc: Stop Postgres and remove volumes
    cmds:
      - docker compose down -v
