syntax = "proto3";

package entitystore.v1;

option go_package = "github.com/laenen-partners/entitystore/gen/entitystore/v1;entitystorev1";

service EntityStoreService {
  rpc GetEntity(GetEntityRequest) returns (GetEntityResponse);
  rpc GetEntitiesByType(GetEntitiesByTypeRequest) returns (GetEntitiesByTypeResponse);
  rpc InsertEntity(InsertEntityRequest) returns (InsertEntityResponse);
  rpc UpdateEntity(UpdateEntityRequest) returns (UpdateEntityResponse);
  rpc MergeEntity(MergeEntityRequest) returns (MergeEntityResponse);
  rpc DeleteEntity(DeleteEntityRequest) returns (DeleteEntityResponse);
  rpc ResolveEntity(ResolveEntityRequest) returns (ResolveEntityResponse);
  rpc FindByAnchors(FindByAnchorsRequest) returns (FindByAnchorsResponse);
  rpc FindByTokens(FindByTokensRequest) returns (FindByTokensResponse);
  rpc FindByEmbedding(FindByEmbeddingRequest) returns (FindByEmbeddingResponse);
  rpc FindConnectedByType(FindConnectedByTypeRequest) returns (FindConnectedByTypeResponse);
  rpc UpsertRelation(UpsertRelationRequest) returns (UpsertRelationResponse);
  rpc GetRelationsFromEntity(GetRelationsFromEntityRequest) returns (GetRelationsFromEntityResponse);
  rpc GetRelationsToEntity(GetRelationsToEntityRequest) returns (GetRelationsToEntityResponse);
  rpc SetTags(SetTagsRequest) returns (SetTagsResponse);
  rpc AddTags(AddTagsRequest) returns (AddTagsResponse);
  rpc RemoveTag(RemoveTagRequest) returns (RemoveTagResponse);
  // Batch operations for bulk extraction workflows.
  rpc BatchInsertEntities(BatchInsertEntitiesRequest) returns (BatchInsertEntitiesResponse);
  rpc BatchResolveEntities(BatchResolveEntitiesRequest) returns (BatchResolveEntitiesResponse);
}

// --- Shared ---

message Entity {
  string id = 1;
  string entity_type = 2;
  bytes data = 3;
  double confidence = 4;
  repeated string tags = 5;
  string created_at = 6;
  string updated_at = 7;
}

message AnchorQuery {
  string field = 1;
  string value = 2;
}

message QueryFilter {
  repeated string tags = 1;
}

message Relation {
  string id = 1;
  string source_id = 2;
  string target_id = 3;
  string relation_type = 4;
  double confidence = 5;
  string evidence = 6;
  bool implied = 7;
  string source_urn = 8;
  bytes data = 9;
  string created_at = 10;
}

// --- GetEntity ---

message GetEntityRequest {
  string id = 1;
}

message GetEntityResponse {
  Entity entity = 1;
}

// --- GetEntitiesByType ---

message GetEntitiesByTypeRequest {
  string entity_type = 1;
  int32 page_size = 2;    // max entities to return (default 100)
  string page_token = 3;  // cursor from previous response (RFC 3339 timestamp)
}

message GetEntitiesByTypeResponse {
  repeated Entity entities = 1;
  string next_page_token = 2; // empty when no more results
}

// --- InsertEntity ---

message InsertEntityRequest {
  string entity_type = 1;
  bytes data = 2;
  double confidence = 3;
  repeated string tags = 4;
}

message InsertEntityResponse {
  Entity entity = 1;
}

// --- UpdateEntity ---

message UpdateEntityRequest {
  string id = 1;
  bytes data = 2;
  double confidence = 3;
}

message UpdateEntityResponse {}

// --- DeleteEntity ---

message DeleteEntityRequest {
  string id = 1;
}

message DeleteEntityResponse {}

// --- FindByAnchors ---

message FindByAnchorsRequest {
  string entity_type = 1;
  repeated AnchorQuery anchors = 2;
  QueryFilter filter = 3;
}

message FindByAnchorsResponse {
  repeated Entity entities = 1;
}

// --- FindByTokens ---

message FindByTokensRequest {
  string entity_type = 1;
  repeated string tokens = 2;
  int32 limit = 3;
  QueryFilter filter = 4;
}

message FindByTokensResponse {
  repeated Entity entities = 1;
}

// --- FindByEmbedding ---

message FindByEmbeddingRequest {
  string entity_type = 1;
  repeated float embedding = 2;
  int32 top_k = 3;
  QueryFilter filter = 4;
}

message FindByEmbeddingResponse {
  repeated Entity entities = 1;
}

// --- FindConnectedByType ---

message FindConnectedByTypeRequest {
  string entity_id = 1;
  string entity_type = 2;
  repeated string relation_types = 3;
  QueryFilter filter = 4;
}

message FindConnectedByTypeResponse {
  repeated Entity entities = 1;
}

// --- UpsertRelation ---

message UpsertRelationRequest {
  string source_id = 1;
  string target_id = 2;
  string relation_type = 3;
  double confidence = 4;
  string evidence = 5;
  bool implied = 6;
  string source_urn = 7;
  bytes data = 8;
}

message UpsertRelationResponse {
  Relation relation = 1;
}

// --- GetRelations ---

message GetRelationsFromEntityRequest {
  string entity_id = 1;
}

message GetRelationsToEntityRequest {
  string entity_id = 1;
}

message GetRelationsFromEntityResponse {
  repeated Relation relations = 1;
}

message GetRelationsToEntityResponse {
  repeated Relation relations = 1;
}

// --- Tags ---

message SetTagsRequest {
  string entity_id = 1;
  repeated string tags = 2;
}

message SetTagsResponse {}

message AddTagsRequest {
  string entity_id = 1;
  repeated string tags = 2;
}

message AddTagsResponse {
  repeated string tags = 1; // resulting tag list after addition
}

message RemoveTagRequest {
  string entity_id = 1;
  string tag = 2;
}

message RemoveTagResponse {}

// --- MergeEntity ---

message MergeEntityRequest {
  string id = 1;
  bytes data = 2;         // JSON fields to merge (overlays on existing data)
  double confidence = 3;
}

message MergeEntityResponse {
  Entity entity = 1;
}

// --- ResolveEntity ---

message TokenList {
  repeated string values = 1;
}

message ResolveEntityRequest {
  // Action: "create", "update", or "merge".
  string action = 1;
  string entity_type = 2;
  bytes data = 3;
  double confidence = 4;
  repeated string tags = 5;
  // Required for "update" and "merge" actions.
  string matched_entity_id = 6;
  // Provenance fields.
  string source_urn = 7;
  string model_id = 8;
  repeated string fields = 9;
  string match_method = 10;
  double match_confidence = 11;
  // Optional: anchors, tokens, embedding for index maintenance.
  repeated AnchorQuery anchors = 12;
  map<string, TokenList> tokens = 13;
  repeated float embedding = 14;
}

message ResolveEntityResponse {
  Entity entity = 1;
}

// --- Batch operations ---

message BatchInsertEntitiesRequest {
  repeated InsertEntityRequest entities = 1;
}

message BatchInsertEntitiesResponse {
  repeated Entity entities = 1;
}

message BatchResolveEntitiesRequest {
  repeated ResolveEntityRequest entities = 1;
}

message BatchResolveEntitiesResponse {
  repeated Entity entities = 1;
}
