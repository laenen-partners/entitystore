syntax = "proto3";

package entitystore.v1;

option go_package = "github.com/laenen-partners/entitystore/gen/entitystore/v1;entitystorev1";

service EntityStoreService {
  // Reads.
  rpc GetEntity(GetEntityRequest) returns (GetEntityResponse);
  rpc GetEntitiesByType(GetEntitiesByTypeRequest) returns (GetEntitiesByTypeResponse);
  rpc FindByAnchors(FindByAnchorsRequest) returns (FindByAnchorsResponse);
  rpc FindByTokens(FindByTokensRequest) returns (FindByTokensResponse);
  rpc FindByEmbedding(FindByEmbeddingRequest) returns (FindByEmbeddingResponse);
  rpc FindConnectedByType(FindConnectedByTypeRequest) returns (FindConnectedByTypeResponse);
  rpc GetRelationsFromEntity(GetRelationsFromEntityRequest) returns (GetRelationsFromEntityResponse);
  rpc GetRelationsToEntity(GetRelationsToEntityRequest) returns (GetRelationsToEntityResponse);

  // Writes — single entry point for all mutations.
  rpc BatchWrite(BatchWriteRequest) returns (BatchWriteResponse);
  rpc DeleteEntity(DeleteEntityRequest) returns (DeleteEntityResponse);

  // Tags.
  rpc SetTags(SetTagsRequest) returns (SetTagsResponse);
  rpc AddTags(AddTagsRequest) returns (AddTagsResponse);
  rpc RemoveTag(RemoveTagRequest) returns (RemoveTagResponse);
}

// --- Shared ---

message Entity {
  string id = 1;
  string entity_type = 2;
  bytes data = 3;
  double confidence = 4;
  repeated string tags = 5;
  string created_at = 6;
  string updated_at = 7;
}

message AnchorQuery {
  string field = 1;
  string value = 2;
}

message QueryFilter {
  repeated string tags = 1;
}

message Relation {
  string id = 1;
  string source_id = 2;
  string target_id = 3;
  string relation_type = 4;
  double confidence = 5;
  string evidence = 6;
  bool implied = 7;
  string source_urn = 8;
  bytes data = 9;
  string created_at = 10;
}

message TokenList {
  repeated string values = 1;
}

// --- GetEntity ---

message GetEntityRequest {
  string id = 1;
}

message GetEntityResponse {
  Entity entity = 1;
}

// --- GetEntitiesByType ---

message GetEntitiesByTypeRequest {
  string entity_type = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message GetEntitiesByTypeResponse {
  repeated Entity entities = 1;
  string next_page_token = 2;
}

// --- DeleteEntity ---

message DeleteEntityRequest {
  string id = 1;
}

message DeleteEntityResponse {}

// --- FindByAnchors ---

message FindByAnchorsRequest {
  string entity_type = 1;
  repeated AnchorQuery anchors = 2;
  QueryFilter filter = 3;
}

message FindByAnchorsResponse {
  repeated Entity entities = 1;
}

// --- FindByTokens ---

message FindByTokensRequest {
  string entity_type = 1;
  repeated string tokens = 2;
  int32 limit = 3;
  QueryFilter filter = 4;
}

message FindByTokensResponse {
  repeated Entity entities = 1;
}

// --- FindByEmbedding ---

message FindByEmbeddingRequest {
  string entity_type = 1;
  repeated float embedding = 2;
  int32 top_k = 3;
  QueryFilter filter = 4;
}

message FindByEmbeddingResponse {
  repeated Entity entities = 1;
}

// --- FindConnectedByType ---

message FindConnectedByTypeRequest {
  string entity_id = 1;
  string entity_type = 2;
  repeated string relation_types = 3;
  QueryFilter filter = 4;
}

message FindConnectedByTypeResponse {
  repeated Entity entities = 1;
}

// --- GetRelations ---

message GetRelationsFromEntityRequest {
  string entity_id = 1;
}

message GetRelationsToEntityRequest {
  string entity_id = 1;
}

message GetRelationsFromEntityResponse {
  repeated Relation relations = 1;
}

message GetRelationsToEntityResponse {
  repeated Relation relations = 1;
}

// --- Tags ---

message SetTagsRequest {
  string entity_id = 1;
  repeated string tags = 2;
}

message SetTagsResponse {}

message AddTagsRequest {
  string entity_id = 1;
  repeated string tags = 2;
}

message AddTagsResponse {
  repeated string tags = 1;
}

message RemoveTagRequest {
  string entity_id = 1;
  string tag = 2;
}

message RemoveTagResponse {}

// --- BatchWrite ---

enum WriteAction {
  WRITE_ACTION_UNSPECIFIED = 0;
  WRITE_ACTION_CREATE = 1;
  WRITE_ACTION_UPDATE = 2;
  WRITE_ACTION_MERGE = 3;
}

message WriteEntityOp {
  WriteAction action = 1;
  string entity_type = 2;
  bytes data = 3;
  double confidence = 4;
  repeated string tags = 5;
  // Required for update and merge actions.
  string matched_entity_id = 6;
  // Optional: client-generated UUID for new entities (create action).
  // Allows referencing the entity ID in subsequent ops within the same batch.
  string id = 15;
  // Provenance.
  string source_urn = 7;
  string model_id = 8;
  repeated string fields = 9;
  string match_method = 10;
  double match_confidence = 11;
  // Index maintenance.
  repeated AnchorQuery anchors = 12;
  map<string, TokenList> tokens = 13;
  repeated float embedding = 14;
}

message UpsertRelationOp {
  string source_id = 1;
  string target_id = 2;
  string relation_type = 3;
  double confidence = 4;
  string evidence = 5;
  bool implied = 6;
  string source_urn = 7;
  bytes data = 8;
}

message BatchWriteOp {
  oneof operation {
    WriteEntityOp write_entity = 1;
    UpsertRelationOp upsert_relation = 2;
  }
}

message BatchWriteRequest {
  repeated BatchWriteOp operations = 1;
}

message BatchWriteResult {
  oneof result {
    Entity entity = 1;
    Relation relation = 2;
  }
}

message BatchWriteResponse {
  repeated BatchWriteResult results = 1;
}
